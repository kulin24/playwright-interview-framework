name: Playwright Test Automation

# When the pipeline runs
on:
  # Trigger on pushes to main and develop branches
  push:
    branches: [main, develop]
  
  # Trigger on pull requests to main
  pull_request:
    branches: [main]
  
  # Run daily at midnight (for regression)
  schedule:
    - cron: '0 0 * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      environment:
        description: 'Test environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - staging

# Environment variables available to all jobs
env:
  PLAYWRIGHT_BROWSERS_PATH: 0  # Use installed browsers

jobs:
  # JOB 1: Lint and Type Check (quick validation)
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: TypeScript type check
        run: npx tsc --noEmit
      
      - name: ESLint check
        run: npx eslint . --ext .ts

  # JOB 2: Smoke Tests (fast, runs on every PR)
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]  # Only run if lint passes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run smoke tests
        run: npx playwright test --grep @smoke --project=ui-chrome
        env:
          TEST_ENV: qa
      
      - name: Upload test results
        if: always()  # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # JOB 3: UI Tests (parallel across browsers)
  ui-tests:
    name: UI Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [smoke]  # Only run if smoke passes
    strategy:
      fail-fast: false  # Don't cancel other browsers if one fails
      matrix:
        browser: [chromium]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
      
      - name: Run UI tests
        run: npx playwright test --grep @ui --project=ui-chrome
        env:
          TEST_ENV: qa
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-results-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # JOB 4: API Tests (lightweight, runs quickly)
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [smoke]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run API tests
        run: npx playwright test --grep @api
        env:
          TEST_ENV: qa
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # JOB 5: Full Regression (with sharding for speed)
  regression:
    name: Regression Tests - ${{ matrix.shard }}/3
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [smoke]  # Only run full regression if smoke passes
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]  # Split tests across 3 parallel jobs
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run regression tests with sharding
        run: |
          npx playwright test \
            --grep @regression \
            --project=ui-chrome \
            --shard=${{ matrix.shard }}/3
        env:
          TEST_ENV: qa
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # JOB 6: Report 
  report:
    name: Upload Test Reports
    runs-on: ubuntu-latest
    needs: [smoke, ui-tests, api-tests, regression]
    if: always()
    timeout-minutes: 10
    
    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      
      - name: Create summary page
        run: |
          # Create a simple HTML summary
          cat > summary.html << 'EOF'
          <html>
          <head><title>Test Reports Summary</title></head>
          <body>
          <h1>Test Execution Reports</h1>
          <p>Download the artifacts below to view individual test reports.</p>
          <ul>
          EOF
          
          # List all reports
          find all-artifacts -name "playwright-report" -type d | while read report; do
            name=$(basename $(dirname $report))
            echo "<li><strong>$name</strong> - Download artifact to view report</li>" >> summary.html
          done
          
          echo "</ul></body></html>" >> summary.html
          
          # Upload summary as step output
          echo "### Test Reports Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the 'all-test-reports' artifact to view individual test reports." >> $GITHUB_STEP_SUMMARY
      
      - name: Upload all reports
        uses: actions/upload-artifact@v4
        with:
          name: all-test-reports
          path: all-artifacts/
          retention-days: 30

  # JOB 7: Performance Check (optional)
  performance:
    name: Performance Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [smoke]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run performance tests
        run: npx playwright test --grep @performance
        env:
          TEST_ENV: qa
      
      - name: Comment PR with results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
            const comment = `## Performance Test Results\n\n` +
              `⏱️ Average test duration: ${results.stats.duration / results.stats.expected / 1000}s\n` +
              `✅ Passed: ${results.stats.passed}\n` +
              `❌ Failed: ${results.stats.failed}`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
